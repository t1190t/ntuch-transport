<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台大兒童轉運外接 · 出勤系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd6;
    
    --text: #2c2825;
    --text-muted: #9a9189;
    --text-light: #c4bfb8;
    --accent: #4a6741;
    --accent-light: #edf2ec;
    --warn: #b85c1a;
    --warn-light: #fef3ec;
    --info: #1a5a8a;
    --info-light: #edf4fb;
    --tag-bg: #ede9e3;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--text);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { color: white; }

  .header-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* ── Layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* ── Search ── */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }

  .search-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 400;
    margin-bottom: 10px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 14px 10px 40px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-light); }

  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    z-index: 200;
    max-height: 280px;
    overflow-y: auto;
    display: none;
  }

  .suggestions.open { display: block; }

  .suggestion-item {
    padding: 9px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    transition: background 0.1s;
    border-bottom: 1px solid var(--bg);
  }

  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--surface2); }

  .suggestion-name {
    font-size: 13px;
    color: var(--text);
    flex: 1;
  }

  .suggestion-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .btn-primary {
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .btn-primary:hover { opacity: 0.82; }

  .btn-clear {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.2s;
    white-space: nowrap;
  }

  .btn-clear:hover { border-color: var(--text-muted); }

  /* ── Results ── */
  #result-area { display: none; }
  #result-area.visible { display: block; }

  .hospital-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 28px;
    margin-bottom: 16px;
    gap: 16px;
  }

  .hospital-name-area h2 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }

  .tag.accent { background: var(--accent-light); color: var(--accent); }
  .tag.warn { background: var(--warn-light); color: var(--warn); }

  .mission-count-box {
    text-align: right;
    flex-shrink: 0;
  }

  .mission-count-num {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 2px;
  }

  .mission-count-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* ── Grid ── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 660px) {
    .info-grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ── Phone records ── */
  .phone-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .phone-record {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 7px;
    transition: background 0.15s;
  }

  .phone-record:hover { background: var(--surface2); }

  .phone-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-top: 1px;
    min-width: 72px;
  }

  .phone-details { flex: 1; min-width: 0; }

  .phone-number {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    margin-bottom: 2px;
    word-break: break-all;
  }

  .phone-contact {
    font-size: 12px;
    color: var(--text-muted);
  }

  .phone-unit {
    font-size: 11px;
    background: var(--tag-bg);
    padding: 1px 7px;
    border-radius: 3px;
    color: var(--text-muted);
    font-family: var(--mono);
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 1px;
  }

  /* ── Placeholder state ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
    opacity: 0.25;
  }

  .empty-state p {
    font-size: 13px;
    font-weight: 300;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .stat-cell {
    background: var(--surface);
    padding: 14px 18px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── No result ── */
  .no-result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    text-align: center;
    color: var(--text-muted);
  }

  .no-result h3 {
    font-size: 15px;
    font-weight: 400;
    margin-bottom: 6px;
    color: var(--text);
  }

  .no-result p {
    font-size: 13px;
  }

  /* ── Phase 2 placeholder cards ── */
  .placeholder-card {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .placeholder-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-light);
    flex-shrink: 0;
  }

  .placeholder-text strong {
    display: block;
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 2px;
  }

  .placeholder-text span {
    font-size: 12px;
    color: var(--text-muted);
  }

  .coming-soon {
    font-size: 10px;
    background: var(--tag-bg);
    color: var(--text-muted);
    padding: 2px 7px;
    border-radius: 4px;
    font-family: var(--mono);
    margin-left: auto;
    flex-shrink: 0;
  }

  .placeholder-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  @media (max-width: 660px) {
    .placeholder-grid { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: repeat(2,1fr); }
  }

  /* ── Divider ── */
  .section-divider {
    margin: 24px 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-divider-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    white-space: nowrap;
  }

  .section-divider hr {
    flex: 1;
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ── Highlight match ── */
  mark {
    background: #fde68a;
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── Time stats block ── */
  .time-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .time-stat-cell {
    background: var(--surface);
    padding: 18px 20px;
  }

  .time-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 400;
  }

  .time-stat-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 3px;
  }

  .time-stat-value span {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .time-stat-sub {
    font-size: 11px;
    color: var(--text-muted);
  }

  .time-stat-cell.highlight {
    background: var(--warn-light);
  }

  .time-stat-cell.highlight .time-stat-value {
    color: var(--warn);
  }

  .time-stat-cell.highlight .time-stat-label {
    color: var(--warn);
    opacity: 0.8;
  }

  @media (max-width: 580px) {
    .time-stats { grid-template-columns: 1fr; }
  }


  /* ── Live grid ── */
  .live-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 700px) { .live-grid { grid-template-columns: 1fr; } }

  /* ── Location dual maps ── */
  .device-maps-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 700px) {
    .device-maps-grid { grid-template-columns: 1fr; }
  }

  .device-map-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
  }

  .device-map-header {
    padding: 10px 14px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--bg);
    gap: 8px;
  }

  .device-map-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--mono);
  }

  .device-map-status {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .device-map-status.out { background: var(--accent-light); color: var(--accent); }
  .device-map-status.in  { background: var(--tag-bg); color: var(--text-muted); }
  .device-map-status.stale { background: var(--warn-light); color: var(--warn); }

  .device-map-time {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    white-space: nowrap;
  }

  .device-map-frame {
    position: relative;
    height: 200px;
    background: var(--bg);
  }

  .device-map-frame iframe {
    width: 100%; height: 100%; border: none;
  }

  .device-map-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    background: var(--bg);
    text-align: center;
    padding: 16px;
  }

  .device-map-stale-warn {
    font-size: 11px;
    color: var(--warn);
    font-weight: 500;
    margin-top: 4px;
    text-align: center;
    padding: 6px 14px;
    background: var(--warn-light);
    border-radius: 4px;
  }

  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-light);
    flex-shrink: 0;
    display: inline-block;
  }
  .pulse-dot.active { background: var(--accent); animation: pulse 2s infinite; }
  .pulse-dot.warn   { background: var(--warn); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(74,103,65,0.4); }
    50%      { box-shadow: 0 0 0 5px rgba(74,103,65,0); }
  }

  .location-loading { color: var(--text-muted); font-size: 13px; padding: 8px 0; }

  /* ── Weather ── */
  .weather-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .weather-icon { font-size: 24px; line-height: 1; }
  .weather-main { font-size: 20px; font-family: var(--mono); font-weight: 300; color: var(--text); }
  .weather-main span { font-size: 12px; color: var(--text-muted); }
  .weather-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* ── Earthquake ── */
  .quake-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--bg);
    font-size: 12px;
  }
  .quake-item:last-child { border-bottom: none; padding-bottom: 0; }
  .quake-mag {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }
  .quake-mag.big { color: var(--warn); }
  .quake-loc { color: var(--text-muted); margin-top: 1px; }
  .quake-time { font-family: var(--mono); font-size: 10px; color: var(--text-light); margin-top: 1px; }
  .quake-none { font-size: 13px; color: var(--accent); }

  /* scrollbar */
  .suggestions::-webkit-scrollbar { width: 5px; }
  .suggestions::-webkit-scrollbar-track { background: transparent; }
  .suggestions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div>
      <div class="header-title">台大兒童醫院 轉運外接系統</div>
      <div class="header-subtitle">NTUCH Transport Team · Dashboard v1.0</div>
    </div>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<main>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-num">727</div>
      <div class="stat-label">歷史任務</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num">117</div>
      <div class="stat-label">合作院所</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num">14</div>
      <div class="stat-label">縣市涵蓋</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num">7</div>
      <div class="stat-label">年資料庫</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-label">輸入出勤院所名稱</div>
    <div class="search-row">
      <div class="search-input-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="例：禾馨民權、花蓮慈濟、林口長庚…"
          autocomplete="off"
        />
        <div class="suggestions" id="suggestions"></div>
      </div>
      <button class="btn-primary" onclick="doSearch()">查詢</button>
      <button class="btn-clear" onclick="clearSearch()">清除</button>
    </div>
  </div>

  <!-- Result area -->
  <div id="result-area">
    <div id="result-content"></div>

    <!-- Live info section -->
    <div class="section-divider">
      <div class="section-divider-label">即時資訊</div>
      <hr>
    </div>

    <!-- Location tracking - dual maps -->
    <div class="card" style="margin-bottom:16px;">
      <div class="card-header">
        <div class="card-title">出勤手機定位</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <div class="pulse-dot" id="location-pulse"></div>
          <span style="font-size:11px;color:var(--text-muted);" id="location-update-time">讀取中…</span>
        </div>
      </div>
      <div class="device-maps-grid" id="device-maps-grid">
        <!-- Rendered by JS -->
        <div class="device-map-card">
          <div class="device-map-header">
            <span class="device-map-name">51579轉診手機</span>
          </div>
          <div class="device-map-frame">
            <div class="device-map-overlay">讀取定位中…</div>
          </div>
        </div>
        <div class="device-map-card">
          <div class="device-map-header">
            <span class="device-map-name">轉診備用機</span>
          </div>
          <div class="device-map-frame">
            <div class="device-map-overlay">讀取定位中…</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Map + travel time + weather + quake -->
    <div class="live-grid" style="margin-bottom:16px;">
      <div class="card" id="map-card">
        <div class="card-header">
          <div class="card-title">導航地圖</div>

const ALL_NAMES = Object.keys(DB);

// eastern counties that need earthquake alert
const EAST_COUNTIES = ['花蓮','台東','宜蘭'];

// ── Clock ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── Search logic ──
const searchInput = document.getElementById('search-input');
const suggestionsEl = document.getElementById('suggestions');
let selectedName = null;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { hideSuggestions(); return; }

  const matches = ALL_NAMES.filter(n => n.includes(q)).slice(0, 12);
  if (!matches.length) { hideSuggestions(); return; }

  suggestionsEl.innerHTML = matches.map(name => {
    const hl = name.replace(q, `<mark>${q}</mark>`);
    return `<div class="suggestion-item" onclick="selectHospital('${name.replace(/'/g,"\\'")}')">
      <span class="suggestion-name">${hl}</span>
      <span class="suggestion-count">${DB[name].count} 次</span>
    </div>`;
  }).join('');
  suggestionsEl.classList.add('open');
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
  if (e.key === 'Escape') hideSuggestions();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-input-wrap')) hideSuggestions();
});

function hideSuggestions() {
  suggestionsEl.classList.remove('open');
}

function selectHospital(name) {
  searchInput.value = name;
  selectedName = name;
  hideSuggestions();
  showResult(name);
}

function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  hideSuggestions();

  // exact match first
  if (DB[q]) { showResult(q); return; }

  // fuzzy: pick first partial match
  const match = ALL_NAMES.find(n => n.includes(q));
  if (match) { showResult(match); return; }

  // not found
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('result-area').classList.add('visible');
  document.getElementById('result-content').innerHTML = `
    <div class="no-result">
      <h3>找不到「${q}」的出勤紀錄</h3>
      <p>這可能是從未出勤過的院所，可在未來出勤後加入資料庫。</p>
    </div>`;
}

function clearSearch() {
  searchInput.value = '';
  selectedName = null;
  hideSuggestions();
  document.getElementById('result-area').classList.remove('visible');
  document.getElementById('empty-state').style.display = '';
  document.getElementById('result-content').innerHTML = '';
}

function showResult(name) {
  const hosp = DB[name];
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('result-area').classList.add('visible');

  const isEast = EAST_COUNTIES.includes(hosp.county);
  const eastWarn = isEast ? `<span class="tag warn">⚠ 東部任務</span>` : '';

  // unique units
  const units = [...new Set(hosp.records.map(r => r.unit).filter(Boolean))];
  const unitTags = units.slice(0,4).map(u => `<span class="tag">${u}</span>`).join('');

  // phone records HTML
  const phoneHTML = hosp.records.map(r => `
    <div class="phone-record">
      <div class="phone-date">${r.date}</div>
      <div class="phone-details">
        <div class="phone-number">${r.phone || '—'}</div>
        <div class="phone-contact">${r.contact || '—'}</div>
      </div>
      <div class="phone-unit">${r.unit || '—'}</div>
    </div>
  `).join('');

  // Time stats block
  const t = TIME_DB[name];
  let timeStatsHTML = '';
  if (t) {
    const maxStayDisplay = (t.max_stay && t.max_stay < 1000)
      ? `${t.max_stay}`
      : null;
    const maxStayDateDisplay = (maxStayDisplay && t.max_stay_date)
      ? t.max_stay_date
      : null;

    timeStatsHTML = `
    <div class="time-stats">
      <div class="time-stat-cell">
        <div class="time-stat-label">平均去程時間</div>
        <div class="time-stat-value">${t.avg_go}<span> 分鐘</span></div>
        <div class="time-stat-sub">台大兒童 → 該院</div>
      </div>
      <div class="time-stat-cell">
        <div class="time-stat-label">平均外院停留時間</div>
        <div class="time-stat-value">${t.avg_stay}<span> 分鐘</span></div>
        <div class="time-stat-sub">歷史平均值</div>
      </div>
      <div class="time-stat-cell${maxStayDisplay ? ' highlight' : ''}">
        <div class="time-stat-label">最長停留紀錄</div>
        <div class="time-stat-value">${maxStayDisplay ? maxStayDisplay + '<span> 分鐘</span>' : '<span style="font-size:14px">—</span>'}</div>
        <div class="time-stat-sub">${maxStayDateDisplay ? maxStayDateDisplay : '資料不足'}</div>
      </div>
    </div>`;
  }

  document.getElementById('result-content').innerHTML = `
    <div class="hospital-header">
      <div class="hospital-name-area">
        <h2>${name}</h2>
        <div class="tags">
          <span class="tag accent">${hosp.county}</span>
          ${unitTags}
          ${eastWarn}
        </div>
      </div>
      <div class="mission-count-box">
        <div class="mission-count-num">${hosp.count}</div>
        <div class="mission-count-label">歷史出勤次數</div>
      </div>
    </div>

    ${timeStatsHTML}

    <div class="info-grid">
      <div class="card" style="grid-column: 1 / -1;">
        <div class="card-header">
          <div class="card-title">最近出勤紀錄（近 ${hosp.records.length} 筆）</div>
        </div>
        <div class="phone-list">${phoneHTML}</div>
      </div>
    </div>
  `;
}

// ── UTILS ──
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  if (isNaN(d)) return isoStr;
  return d.toLocaleString('zh-TW', {timeZone:'Asia/Taipei', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
}

function minsAgo(isoStr) {
  const diff = (Date.now() - new Date(isoStr)) / 60000;
  if (diff < 1) return '剛才';
  if (diff < 60) return `${Math.round(diff)} 分鐘前`;
  return `${Math.round(diff/60)} 小時前`;
}

  }, (response, status) => {
    if (status === 'OK') {
      directionsRenderer.setDirections(response);
    } else {
      // 若路線規劃失敗，退回畫直線
      new google.maps.Polyline({
        path: [{lat: NTUCH_LAT, lng: NTUCH_LNG}, {lat: currentDestLat, lng: currentDestLng}],
        map, strokeColor:'#4a6741', strokeOpacity:0.4, strokeWeight:2
      });
    }
  });

  mapInstance = map;
  fetchTravelTime();
}

// ── TRAVEL TIME ──
async function fetchTravelTime() {
  if (!currentDestLat || !window.google) return;
  const badge = document.getElementById('travel-time-badge');
  badge.style.display = 'inline-block';
  badge.textContent = '計算車程中…';
  badge.style.backgroundColor = 'var(--tag-bg)';
  badge.style.color = 'var(--text-muted)';
  badge.style.fontSize = '12px';

  // 🌟 使用 DistanceMatrix 取得精確預估時間
  const service = new google.maps.DistanceMatrixService();
  service.getDistanceMatrix({
    origins: [{ lat: NTUCH_LAT, lng: NTUCH_LNG }],
    destinations: [{ lat: currentDestLat, lng: currentDestLng }],
    travelMode: 'DRIVING',
    language: 'zh-TW'
  }, (response, status) => {
    if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
      const durationText = response.rows[0].elements[0].duration.text;
      badge.textContent = `預計抵達目的地需要 ${durationText}`;
      badge.style.backgroundColor = 'var(--warn-light)';
      badge.style.color = 'var(--warn)';
      badge.style.fontWeight = '500';
    } else {
      badge.textContent = '無法取得車程';
    }
  });
}

// ── WEATHER (CWA) ──
const WEATHER_ICONS = {
  '晴': '☀️', '多雲': '⛅', '陰': '☁️', '雨': '🌧️', '雷': '⛈️',
  '霧': '🌫️', '雪': '❄️', '陣雨': '🌦️', '短暫雨': '🌦️'
};

function weatherIcon(desc) {
  for (const [k, v] of Object.entries(WEATHER_ICONS)) {
    if (desc.includes(k)) return v;
  }
  return '🌤️';
}

// 將你的醫院資料庫縣市對應到氣象署標準格式
const CWA_CITY_MAP = {
  '台北市':'臺北市', '新北市':'新北市', '桃園':'桃園市', '桃園市':'桃園市',
  '新竹':'新竹市', '新竹市':'新竹市', '新竹縣':'新竹縣', '苗栗':'苗栗縣',
  '台中':'臺中市', '台中市':'臺中市', '彰化':'彰化縣', '南投':'南投縣',
  '雲林':'雲林縣', '嘉義':'嘉義市', '嘉義市':'嘉義市', '嘉義縣':'嘉義縣',
  '台南':'臺南市', '高雄':'高雄市', '屏東':'屏東縣', '宜蘭':'宜蘭縣',
  '花蓮':'花蓮縣', '台東':'臺東縣', '基隆':'基隆市'
};

async function fetchWeather(county) {
  const el = document.getElementById('weather-content');
  const cwaLocation = CWA_CITY_MAP[county] || '臺北市';
  
  try {
    // 🌟 改用穩定度高的 F-C0032-001 (36小時天氣預報)
    const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(cwaLocation)}`;
    const res = await fetch(url);
    const data = await res.json();
    const locs = data?.records?.location;
    if (!locs || !locs.length) throw new Error('no data');

    const elements = locs[0].weatherElement;
    const getVal = (name) => elements.find(e => e.elementName === name)?.time[0]?.parameter?.parameterName || '';

    const wx = getVal('Wx'); // 天氣現象
    const pop = getVal('PoP'); // 降雨機率
    const minT = getVal('MinT'); // 最低溫
    const maxT = getVal('MaxT'); // 最高溫

    let tempText = (minT && maxT) ? `${minT}°C - ${maxT}°C` : `${minT || maxT || ''}°C`;
    let rainText = pop ? `降雨機率 ${pop}%` : '';

    el.innerHTML = `
      <div class="weather-row">
        <div class="weather-icon">${weatherIcon(wx)}</div>
        <div>
          <div class="weather-main">${county} <span style="font-size: 14px; font-weight: normal; color: var(--text);">${wx}</span></div>
          <div class="weather-desc">${tempText}${tempText && rainText && tempText !== '°C' ? '　|　' : ''}${rainText}</div>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<span style="color:var(--text-muted);font-size:12px;">天氣資料無法取得</span>`;
  }
}

// ── EARTHQUAKE (CWA) ──
async function fetchEarthquakes() {
  const el = document.getElementById('quake-content');
  try {
    const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/E-A0015-001?Authorization=${CWA_API_KEY}&limit=5`;
    const res = await fetch(url);
    const data = await res.json();
    const quakes = data?.records?.Earthquake;
    if (!quakes || !quakes.length) { el.innerHTML = '<span class="quake-none">近期無顯著地震</span>'; return; }

    const now = Date.now();
    const h48 = 48 * 3600 * 1000;
    const recent = quakes.filter(q => {
      const t = new Date(q.EarthquakeInfo?.OriginTime || 0).getTime();
      return (now - t) < h48;
    });

    if (!recent.length) {
      el.innerHTML = '<span class="quake-none">✓ 近48小時無顯著地震</span>';
      return;
    }

    el.innerHTML = recent.map(q => {
      const info = q.EarthquakeInfo || {};
      const mag = parseFloat(info.EarthquakeMagnitude?.MagnitudeValue || 0);
      const loc = info.Epicenter?.Location || '—';
      const time = formatTime(info.OriginTime || '');
      const isBig = mag >= 4;
      return `<div class="quake-item">
        <span class="quake-mag${isBig ? ' big' : ''}">${isBig ? '⚠ ' : ''}規模 ${mag.toFixed(1)}</span>
        <div class="quake-loc">${loc}</div>
        <div class="quake-time">${time}</div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">地震資料無法取得</span>';
  }
}

// ── GEOCODE HOSPITAL ──
async function geocodeHospital(name, county) {
  return new Promise((resolve) => {
    if (!window.google || !window.google.maps || !window.google.maps.Geocoder) {
      resolve(null);
      return;
    }
    const geocoder = new google.maps.Geocoder();
    geocoder.geocode({ address: name + ' ' + county + ' 台灣', region: 'TW' }, (results, status) => {
      if (status === 'OK' && results[0]) {
        const loc = results[0].geometry.location;
        resolve({ lat: loc.lat(), lng: loc.lng() });
      } else {
        resolve(null);
      }
    });
  });
}

// ── LOCATION TRACKING ──
function formatTWTime(isoStr) {
  const d = new Date(isoStr);
  if (isNaN(d)) return '—';
  return d.toLocaleString('zh-TW', {
    timeZone: 'Asia/Taipei',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).replace(/\//g, '/');
}

async function fetchSheetLocation(sheetName) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url);
    const text = await res.text();
    const jsonStr = text.replace(/^[^(]+\(/, '').replace(/\);?$/, '');
    const data = JSON.parse(jsonStr);
    const rows = data?.table?.rows || [];

    for (let i = rows.length - 1; i >= 0; i--) {
      const row = rows[i].c;
      const latVal = row?.[1]?.v;
      const lngVal = row?.[2]?.v;

      if (latVal && lngVal && !isNaN(parseFloat(latVal)) && !isNaN(parseFloat(lngVal))) {
        let timeStr = row?.[0]?.v || '';
        let parsedTime = null;

        if (typeof timeStr === 'string' && timeStr.startsWith('Date(')) {
          // gviz Date: Date(year, month0, day, h, m, s) - local TW time
          const parts = timeStr.replace('Date(','').replace(')','').split(',').map(Number);
          // Convert TW local (UTC+8) → UTC
          parsedTime = new Date(Date.UTC(parts[0], parts[1], parts[2],
            (parts[3]||0) - 8, parts[4]||0, parts[5]||0));
      } else if (timeStr) {
          parsedTime = new Date(timeStr);
          if (isNaN(parsedTime)) {
            let isPM = timeStr.includes('下午');
            let isAM = timeStr.includes('上午');
            
            // 先清除文字中的上下午，並去除前後空白
            let cleaned = timeStr.replace('上午', '').replace('下午', '').trim();
            
            // 找出日期與時間的部分 (例如: 2025/10/24 02:30:00)
            let timeMatch = cleaned.match(/(.*?)\s+(\d{1,2}):(\d{1,2}):(\d{1,2})(.*)/);
            
            if (timeMatch) {
              // 為了確保手機端 (Safari) 也能正確解析，把日期分隔符統一換成斜線
              let datePart = timeMatch[1].replace(/-/g, '/');
              let h = parseInt(timeMatch[2], 10);
              let m = timeMatch[3];
              let s = timeMatch[4];
              let restPart = timeMatch[5];
              
              // 進行 24 小時制的邏輯轉換
              if (isPM && h < 12) h += 12;
              if (isAM && h === 12) h = 0;
              
              // 把小時補齊為兩位數
              let hStr = String(h).padStart(2, '0');
              parsedTime = new Date(`${datePart} ${hStr}:${m}:${s}${restPart}`);
            } else {
              // 如果無法匹配時間格式，則做最後的安全處理
              parsedTime = new Date(cleaned.replace(/-/g, '/'));
            }
          }
        
        const isoTime = (parsedTime && !isNaN(parsedTime))
          ? parsedTime.toISOString()
          : new Date(0).toISOString();

        return {
          time: isoTime,
          lat: parseFloat(latVal),
          lng: parseFloat(lngVal),
          acc: parseFloat(row?.[3]?.v || 0)
        };
      }
    }
  } catch(e) { console.error('Sheets error', e); }
  return null;
}

function buildDeviceMapURL(r, isOutside) {
  if (!isOutside) {
    // Show NTUCH
    return `https://www.google.com/maps/embed/v1/place?key=${MAPS_API_KEY}&q=${NTUCH_LAT},${NTUCH_LNG}&zoom=16&language=zh-TW`;
  }
  if (currentDestLat && currentDestLng) {
    // Show navigation: NTUCH → destination, with phone marker via waypoint
    return `https://www.google.com/maps/embed/v1/directions?key=${MAPS_API_KEY}&origin=${NTUCH_LAT},${NTUCH_LNG}&destination=${currentDestLat},${currentDestLng}&waypoints=${r.lat},${r.lng}&mode=driving&language=zh-TW`;
  }
  // No destination set - just show phone location
  return `https://www.google.com/maps/embed/v1/place?key=${MAPS_API_KEY}&q=${r.lat},${r.lng}&zoom=15&language=zh-TW`;
}

async function updateLocationDisplay() {
  const timeEl = document.getElementById('location-update-time');
  const pulse  = document.getElementById('location-pulse');
  const grid   = document.getElementById('device-maps-grid');

  const results = await Promise.all(DEVICES.map(d => fetchSheetLocation(d.id)));
  const now = Date.now();
  const STALE_MS = 30 * 60 * 1000; // 30 minutes

  // Update header timestamp with latest valid time
  const validTimes = results.filter(Boolean)
    .map(r => new Date(r.time))
    .filter(d => !isNaN(d.getTime()))
    .sort((a,b) => b - a);
  if (validTimes[0]) {
    timeEl.textContent = `最後更新：${formatTWTime(validTimes[0].toISOString())}`;
  }

  // Check if any device is outside
  const anyOutside = results.some((r, i) => {
    if (!r) return false;
    return haversine(r.lat, r.lng, NTUCH_LAT, NTUCH_LNG) > NTUCH_RADIUS_M;
  });
  pulse.className = anyOutside ? 'pulse-dot active' : 'pulse-dot idle';

  // Render each device card
  const cards = await Promise.all(DEVICES.map(async (device, i) => {
    const r = results[i];
    const label = device.label;

    if (!r) {
      return `<div class="device-map-card">
        <div class="device-map-header">
          <span class="device-map-name">${label}</span>
          <span class="device-map-status stale">無資料</span>
        </div>
        <div class="device-map-frame">
          <div class="device-map-overlay">無法取得定位資料</div>
        </div>
      </div>`;
    }

    const dist = haversine(r.lat, r.lng, NTUCH_LAT, NTUCH_LNG);
    const isOutside = dist > NTUCH_RADIUS_M;
    const dataAge = now - new Date(r.time).getTime();
    const isStale = dataAge > STALE_MS;
    const lastUpdateStr = formatTWTime(r.time);
    const distText = dist > 1000 ? `${(dist/1000).toFixed(1)} km` : `${Math.round(dist)} m`;

    const statusClass = isStale ? 'stale' : (isOutside ? 'out' : 'in');
    const statusText  = isStale ? '逾時' : (isOutside ? '出勤中' : '院內');

    const mapURL = buildDeviceMapURL(r, isOutside);

    const staleWarn = isStale
      ? `<div class="device-map-stale-warn">⚠ 此裝置已超過 30 分鐘無新的 GPS 數據</div>`
      : '';

    const inMission = isOutside && !isStale;
    const noMissionOverlay = (!isOutside && !isStale)
      ? `<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(247,245,242,0.88);padding:8px 12px;text-align:center;font-size:12px;color:var(--text-muted);">
           🏥 目前沒有出勤任務
         </div>`
      : '';

    return `<div class="device-map-card">
      <div class="device-map-header">
        <span class="device-map-name">${label}</span>
        <span class="device-map-time">最後更新：${lastUpdateStr}</span>
        <span class="device-map-status ${statusClass}">${statusText}${isOutside && !isStale ? '　' + distText : ''}</span>
      </div>
      <div class="device-map-frame" style="position:relative;">
        <iframe src="${mapURL}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        ${noMissionOverlay}
      </div>
      ${staleWarn}
    </div>`;
  }));

  grid.innerHTML = cards.join('');
}

// ── INIT & INTERVAL ──
function startLiveUpdates() {
  updateLocationDisplay();
  fetchEarthquakes();
  if (locationInterval) clearInterval(locationInterval);
  locationInterval = setInterval(updateLocationDisplay, 2 * 60 * 1000); 
}
