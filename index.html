<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台大兒童轉運外接 · 出勤系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd6;
    --text: #2c2825;
    --text-muted: #9a9189;
    --text-light: #c4bfb8;
    --accent: #4a6741;
    --accent-light: #edf2ec;
    --warn: #b85c1a;
    --warn-light: #fef3ec;
    --info: #1a5a8a;
    --info-light: #edf4fb;
    --tag-bg: #ede9e3;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;

    /* 蘇花面板專用色 */
    --suhua-bg: #fefcf9;
    --suhua-border: #e8b87a;
    --suhua-header: #7c4a10;
    --suhua-header-bg: #fff4e6;
    --road-green: #166534;
    --road-green-bg: #dcfce7;
    --road-yellow: #92400e;
    --road-yellow-bg: #fef9c3;
    --road-red: #991b1b;
    --road-red-bg: #fee2e2;
    --eq-high-bg: #fee2e2;
    --eq-high-fg: #991b1b;
    --eq-mid-bg: #fef9c3;
    --eq-mid-fg: #92400e;
    --eq-low-bg: #f1f5f9;
    --eq-low-fg: #475569;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--text);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { color: white; }
  .header-title { font-size: 14px; font-weight: 500; letter-spacing: 0.02em; color: var(--text); }
  .header-subtitle { font-size: 11px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.04em; }
  .clock { font-family: var(--mono); font-size: 13px; color: var(--text-muted); letter-spacing: 0.06em; }

  /* ── Layout ── */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  /* ── Search ── */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  .search-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); font-weight: 400; margin-bottom: 10px; }
  .search-row { display: flex; gap: 10px; align-items: center; }
  .search-input-wrap { flex: 1; position: relative; }
  .search-input {
    width: 100%; border: 1.5px solid var(--border); background: var(--bg);
    border-radius: 8px; padding: 10px 14px 10px 40px;
    font-family: var(--sans); font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-light); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .suggestions {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08); z-index: 200;
    max-height: 280px; overflow-y: auto; display: none;
  }
  .suggestions.open { display: block; }
  .suggestion-item {
    padding: 9px 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    transition: background 0.1s; border-bottom: 1px solid var(--bg);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--surface2); }
  .suggestion-name { font-size: 13px; color: var(--text); flex: 1; }
  .suggestion-count { font-family: var(--mono); font-size: 11px; color: var(--text-muted); background: var(--tag-bg); padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
  .btn-primary { background: var(--text); color: white; border: none; border-radius: 8px; padding: 10px 20px; font-family: var(--sans); font-size: 13px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; font-weight: 400; letter-spacing: 0.02em; }
  .btn-primary:hover { opacity: 0.82; }
  .btn-clear { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 16px; font-family: var(--sans); font-size: 13px; color: var(--text-muted); cursor: pointer; transition: border-color 0.2s; white-space: nowrap; }
  .btn-clear:hover { border-color: var(--text-muted); }

  /* ── Results ── */
  #result-area { display: none; }
  #result-area.visible { display: block; }
  .hospital-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 22px 28px; margin-bottom: 16px; gap: 16px;
  }
  .hospital-name-area h2 { font-size: 18px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 6px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 4px; background: var(--tag-bg); color: var(--text-muted); font-family: var(--mono); letter-spacing: 0.02em; }
  .tag.accent { background: var(--accent-light); color: var(--accent); }
  .tag.warn { background: var(--warn-light); color: var(--warn); }
  .mission-count-box { text-align: right; flex-shrink: 0; }
  .mission-count-num { font-family: var(--mono); font-size: 32px; font-weight: 300; color: var(--text); line-height: 1; margin-bottom: 2px; }
  .mission-count-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }

  /* ── Grid ── */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 660px) { .info-grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 400; }

  /* ── Phone records ── */
  .phone-list { display: flex; flex-direction: column; gap: 8px; }
  .phone-record { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; background: var(--bg); border-radius: 7px; transition: background 0.15s; }
  .phone-record:hover { background: var(--surface2); }
  .phone-date { font-family: var(--mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; margin-top: 1px; min-width: 72px; }
  .phone-details { flex: 1; min-width: 0; }
  .phone-number { font-family: var(--mono); font-size: 13px; color: var(--text); margin-bottom: 2px; word-break: break-all; }
  .phone-contact { font-size: 12px; color: var(--text-muted); }
  .phone-unit { font-size: 11px; background: var(--tag-bg); padding: 1px 7px; border-radius: 3px; color: var(--text-muted); font-family: var(--mono); white-space: nowrap; align-self: flex-start; margin-top: 1px; }

  /* ── Placeholder ── */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.25; }
  .empty-state p { font-size: 13px; font-weight: 300; }

  /* ── Stats bar ── */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .stat-cell { background: var(--surface); padding: 14px 18px; text-align: center; }
  .stat-num { font-family: var(--mono); font-size: 20px; font-weight: 300; color: var(--text); line-height: 1; margin-bottom: 3px; }
  .stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── No result ── */
  .no-result { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px 28px; text-align: center; color: var(--text-muted); }
  .no-result h3 { font-size: 15px; font-weight: 400; margin-bottom: 6px; color: var(--text); }
  .no-result p { font-size: 13px; }

  /* ── Section divider ── */
  .section-divider { margin: 24px 0 16px; display: flex; align-items: center; gap: 10px; }
  .section-divider-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); white-space: nowrap; }
  .section-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }

  /* ── Highlight match ── */
  mark { background: #fde68a; color: inherit; border-radius: 2px; padding: 0 1px; }

  /* ── Time stats ── */
  .time-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
  .time-stat-cell { background: var(--surface); padding: 18px 20px; }
  .time-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; font-weight: 400; }
  .time-stat-value { font-family: var(--mono); font-size: 28px; font-weight: 300; color: var(--text); line-height: 1; margin-bottom: 3px; }
  .time-stat-value span { font-size: 13px; color: var(--text-muted); font-weight: 300; }
  .time-stat-sub { font-size: 11px; color: var(--text-muted); }
  .time-stat-cell.highlight { background: var(--warn-light); }
  .time-stat-cell.highlight .time-stat-value { color: var(--warn); }
  .time-stat-cell.highlight .time-stat-label { color: var(--warn); opacity: 0.8; }
  @media (max-width: 580px) { .time-stats { grid-template-columns: 1fr; } }

  /* ── Live grid ── */
  .live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .live-grid { grid-template-columns: 1fr; } }

  /* ── Device maps ── */
  .device-maps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 700px) { .device-maps-grid { grid-template-columns: 1fr; } }
  .device-map-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); }
  .device-map-header { padding: 10px 14px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bg); gap: 8px; }
  .device-map-name { font-size: 12px; font-weight: 500; color: var(--text); font-family: var(--mono); }
  .device-map-status { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-family: var(--mono); white-space: nowrap; }
  .device-map-status.out { background: var(--accent-light); color: var(--accent); }
  .device-map-status.in  { background: var(--tag-bg); color: var(--text-muted); }
  .device-map-status.stale { background: var(--warn-light); color: var(--warn); }
  .device-map-status.returning { background: var(--warn-light); color: var(--warn); }
  .device-map-time { font-size: 10px; font-family: var(--mono); color: var(--text-muted); white-space: nowrap; }
  .device-map-frame { position: relative; height: 200px; background: var(--bg); }
  .device-map-frame iframe { width: 100%; height: 100%; border: none; }
  .device-map-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; font-size: 13px; color: var(--text-muted); background: var(--bg); text-align: center; padding: 16px; }
  .device-map-stale-warn { font-size: 11px; color: var(--warn); font-weight: 500; margin-top: 4px; text-align: center; padding: 6px 14px; background: var(--warn-light); border-radius: 4px; }
  .device-eta-row { padding: 7px 14px; display: flex; align-items: center; gap: 6px; background: var(--accent-light); border-bottom: 1px solid var(--bg); flex-wrap: wrap; }
  .device-eta-row.returning { background: var(--warn-light); }
  .device-eta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-right: 2px; }
  .device-eta-mins { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); }
  .device-eta-row.returning .device-eta-mins { color: var(--warn); }
  .device-eta-arrival { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-light); flex-shrink: 0; display: inline-block; }
  .pulse-dot.active { background: var(--accent); animation: pulse 2s infinite; }
  .pulse-dot.warn   { background: var(--warn); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(74,103,65,0.4); } 50% { box-shadow: 0 0 0 5px rgba(74,103,65,0); } }

  /* ── Weather ── */
  .weather-row { display: flex; align-items: center; gap: 10px; }
  .weather-icon { font-size: 24px; line-height: 1; }
  .weather-main { font-size: 20px; font-family: var(--mono); font-weight: 300; color: var(--text); }
  .weather-main span { font-size: 12px; color: var(--text-muted); }
  .weather-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* ── Earthquake ── */
  .quake-item { padding: 8px 0; border-bottom: 1px solid var(--bg); font-size: 12px; }
  .quake-item:last-child { border-bottom: none; padding-bottom: 0; }
  .quake-mag { font-family: var(--mono); font-size: 14px; font-weight: 400; color: var(--text); }
  .quake-mag.big { color: var(--warn); }
  .quake-loc { color: var(--text-muted); margin-top: 1px; }
  .quake-time { font-family: var(--mono); font-size: 10px; color: var(--text-light); margin-top: 1px; }
  .quake-none { font-size: 13px; color: var(--accent); }

  /* scrollbar */
  .suggestions::-webkit-scrollbar { width: 5px; }
  .suggestions::-webkit-scrollbar-track { background: transparent; }
  .suggestions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ══════════════════════════════════════════
     ── 蘇花路況面板 ──
  ══════════════════════════════════════════ */
  #suhua-panel {
    display: none;
    margin-bottom: 20px;
    animation: suhuaSlideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }

  #suhua-panel.visible { display: block; }

  @keyframes suhuaSlideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .suhua-container {
    border: 1.5px solid var(--suhua-border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--suhua-bg);
  }

  /* 面板標頭 */
  .suhua-header {
    background: var(--suhua-header-bg);
    border-bottom: 1px solid var(--suhua-border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .suhua-header:hover { background: #ffefd6; }

  .suhua-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .suhua-icon {
    font-size: 18px;
    line-height: 1;
  }

  .suhua-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--suhua-header);
    letter-spacing: 0.02em;
  }

  .suhua-subtitle {
    font-size: 11px;
    color: #a0653a;
    margin-top: 1px;
  }

  .suhua-toggle-btn {
    background: none;
    border: 1px solid var(--suhua-border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: var(--sans);
    color: var(--suhua-header);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .suhua-toggle-btn:hover { background: rgba(124,74,16,0.08); }

  .suhua-chevron {
    transition: transform 0.25s;
    font-style: normal;
  }

  .suhua-chevron.up { transform: rotate(180deg); }

  /* 面板內容 */
  .suhua-body {
    padding: 16px 20px;
    display: none;
  }

  .suhua-body.expanded { display: block; }

  /* Loading 狀態 */
  .suhua-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
    padding: 8px 0;
  }

  .suhua-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--warn);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 三欄格線 */
  .suhua-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  @media (max-width: 720px) { .suhua-grid { grid-template-columns: 1fr; } }
  @media (max-width: 900px) and (min-width: 721px) { .suhua-grid { grid-template-columns: 1fr 1fr; } }

  .suhua-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    overflow: hidden;
  }

  .suhua-card-header {
    padding: 9px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .suhua-card-body { padding: 12px 14px; }

  /* 路況列 */
  .road-row {
    padding: 7px 0;
    border-bottom: 1px solid var(--bg);
    font-size: 12px;
  }

  .road-row:last-child { border-bottom: none; padding-bottom: 0; }

  .road-row-top {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 3px;
  }

  .road-section-name {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .road-badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 3px;
    font-family: var(--mono);
    font-weight: 500;
    white-space: nowrap;
  }

  .road-badge.green  { background: var(--road-green-bg);  color: var(--road-green); }
  .road-badge.yellow { background: var(--road-yellow-bg); color: var(--road-yellow); }
  .road-badge.red    { background: var(--road-red-bg);    color: var(--road-red); }

  .road-row-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .road-type-tag {
    display: inline-block;
    font-size: 9px;
    padding: 0px 5px;
    border-radius: 3px;
    background: var(--info-light);
    color: var(--info);
    font-family: var(--mono);
    margin-left: 4px;
    vertical-align: middle;
  }

  .road-type-tag.old {
    background: var(--tag-bg);
    color: var(--text-muted);
  }

  /* 雨量列 */
  .rain-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--bg);
    font-size: 12px;
    gap: 8px;
  }

  .rain-row:last-child { border-bottom: none; padding-bottom: 0; }

  .rain-location {
    color: var(--text-muted);
    flex-shrink: 0;
    font-size: 11px;
  }

  .rain-right { text-align: right; }

  .rain-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
  }

  .rain-value.green  { color: var(--road-green); }
  .rain-value.blue   { color: var(--info); }
  .rain-value.yellow { color: var(--road-yellow); }
  .rain-value.orange { color: var(--warn); }
  .rain-value.red    { color: var(--road-red); }

  .rain-forecast {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .rain-forecast.warn { color: #c2410c; font-weight: 500; }

  /* 地震列 */
  .eq-row {
    padding: 7px 0;
    border-bottom: 1px solid var(--bg);
    font-size: 12px;
  }

  .eq-row:last-child { border-bottom: none; padding-bottom: 0; }

  .eq-row-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }

  .eq-mag {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .eq-mag.big { color: var(--road-red); }

  .eq-loc {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .eq-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .eq-badge {

const ALL_NAMES = Object.keys(DB);
const EAST_COUNTIES = ['花蓮', '台東', '宜蘭'];
const SUHUA_BACKEND = 'https://su-hua-dashboard.onrender.com';

// ── Clock ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── Search ──
const searchInput = document.getElementById('search-input');
const suggestionsEl = document.getElementById('suggestions');
let selectedName = null;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { hideSuggestions(); return; }
  const matches = ALL_NAMES.filter(n => n.includes(q)).slice(0, 12);
  if (!matches.length) { hideSuggestions(); return; }
  suggestionsEl.innerHTML = matches.map(name => {
    const hl = name.replace(q, `<mark>${q}</mark>`);
    return `<div class="suggestion-item" onclick="selectHospital('${name.replace(/'/g,"\\'")}')">
      <span class="suggestion-name">${hl}</span>
      <span class="suggestion-count">${DB[name].count} 次</span>
    </div>`;
  }).join('');
  suggestionsEl.classList.add('open');
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
  if (e.key === 'Escape') hideSuggestions();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-input-wrap')) hideSuggestions();
});

function hideSuggestions() { suggestionsEl.classList.remove('open'); }

function selectHospital(name) {
  searchInput.value = name;
  selectedName = name;
  hideSuggestions();
  showResult(name);
}

function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  hideSuggestions();
  if (DB[q]) { showResult(q); return; }
  const match = ALL_NAMES.find(n => n.includes(q));
  if (match) { showResult(match); return; }
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('result-area').classList.add('visible');
  document.getElementById('result-content').innerHTML = `
    <div class="no-result">
      <h3>找不到「${q}」的出勤紀錄</h3>
      <p>這可能是從未出勤過的院所，可在未來出勤後加入資料庫。</p>
    </div>`;
  hideSuhuaPanel();
}

function clearSearch() {
  searchInput.value = '';
  selectedName = null;
  hideSuggestions();
  document.getElementById('result-area').classList.remove('visible');
  document.getElementById('empty-state').style.display = '';
  document.getElementById('result-content').innerHTML = '';
  hideSuhuaPanel();
}

function showResult(name) {
  const hosp = DB[name];
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('result-area').classList.add('visible');

  const isEast = EAST_COUNTIES.includes(hosp.county);
  const eastWarn = isEast ? `<span class="tag warn">⚠ 東部任務</span>` : '';
  const units = [...new Set(hosp.records.map(r => r.unit).filter(Boolean))];
  const unitTags = units.slice(0,4).map(u => `<span class="tag">${u}</span>`).join('');
  const phoneHTML = hosp.records.map(r => `
    <div class="phone-record">
      <div class="phone-date">${r.date}</div>
      <div class="phone-details">
        <div class="phone-number">${r.phone || '—'}</div>
        <div class="phone-contact">${r.contact || '—'}</div>
      </div>
      <div class="phone-unit">${r.unit || '—'}</div>
    </div>`).join('');

  const t = TIME_DB[name];
  let timeStatsHTML = '';
  if (t) {
    const maxStayDisplay = (t.max_stay && t.max_stay < 1000) ? `${t.max_stay}` : null;
    const maxStayDateDisplay = (maxStayDisplay && t.max_stay_date) ? t.max_stay_date : null;
    timeStatsHTML = `
    <div class="time-stats">
      <div class="time-stat-cell">
        <div class="time-stat-label">平均去程時間</div>
        <div class="time-stat-value">${t.avg_go}<span> 分鐘</span></div>
        <div class="time-stat-sub">台大兒童 → 該院</div>
      </div>
      <div class="time-stat-cell">
        <div class="time-stat-label">平均外院停留時間</div>
        <div class="time-stat-value">${t.avg_stay}<span> 分鐘</span></div>
        <div class="time-stat-sub">歷史平均值</div>
      </div>
      <div class="time-stat-cell${maxStayDisplay ? ' highlight' : ''}">
        <div class="time-stat-label">最長停留紀錄</div>
        <div class="time-stat-value">${maxStayDisplay ? maxStayDisplay + '<span> 分鐘</span>' : '<span style="font-size:14px">—</span>'}</div>
        <div class="time-stat-sub">${maxStayDateDisplay ? maxStayDateDisplay : '資料不足'}</div>
      </div>
    </div>`;
  }

  document.getElementById('result-content').innerHTML = `
    <div class="hospital-header">
      <div class="hospital-name-area">
        <h2>${name}</h2>
        <div class="tags">
          <span class="tag accent">${hosp.county}</span>
          ${unitTags}
          ${eastWarn}
        </div>
      </div>
      <div class="mission-count-box">
        <div class="mission-count-num">${hosp.count}</div>
        <div class="mission-count-label">歷史出勤次數</div>
      </div>
    </div>
    ${timeStatsHTML}
    <div class="info-grid">
      <div class="card" style="grid-column: 1 / -1;">
        <div class="card-header">
          <div class="card-title">最近出勤紀錄（近 ${hosp.records.length} 筆）</div>
        </div>
        <div class="phone-list">${phoneHTML}</div>
      </div>
    </div>`;

  // ── 蘇花面板：東部才顯示 ──
  if (isEast) {
    showSuhuaPanel(hosp.county);
  } else {
    hideSuhuaPanel();
  }
}

// ══════════════════════════════════════════
// 蘇花路況面板邏輯
// ══════════════════════════════════════════
let suhuaBodyExpanded = true;
let suhuaDataLoaded   = false;
let suhuaCurrentCounty = '';

function showSuhuaPanel(county) {
  const panel = document.getElementById('suhua-panel');
  panel.classList.add('visible');

  // 捲動到面板
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // 更新副標題
  const countyLabel = { '花蓮': '花蓮縣', '台東': '台東縣', '宜蘭': '宜蘭縣' };
  document.getElementById('suhua-subtitle').textContent =
    `偵測到東部任務（${countyLabel[county] || county}）— 蘇花路況自動啟用`;

  // 確保展開
  if (!suhuaBodyExpanded) toggleSuhuaBody(true);

  // 若縣市不同或尚未載入，重新抓資料
  if (county !== suhuaCurrentCounty || !suhuaDataLoaded) {
    suhuaCurrentCounty = county;
    suhuaDataLoaded = false;
    loadSuhuaData();
  }
}

function hideSuhuaPanel() {
  document.getElementById('suhua-panel').classList.remove('visible');
  suhuaCurrentCounty = '';
  suhuaDataLoaded = false;
}

function toggleSuhuaBody(forceOpen) {
  const body    = document.getElementById('suhua-body');
  const chevron = document.getElementById('suhua-chevron');
  const btn     = document.getElementById('suhua-toggle-btn');

  if (forceOpen === true || !suhuaBodyExpanded) {
    body.classList.add('expanded');
    chevron.classList.add('up');
    btn.querySelector('span').textContent = '收起';
    suhuaBodyExpanded = true;
  } else {
    body.classList.remove('expanded');
    chevron.classList.remove('up');
    btn.querySelector('span').textContent = '展開';
    suhuaBodyExpanded = false;
  }
}

async function loadSuhuaData() {
  const loading = document.getElementById('suhua-loading');
  const content = document.getElementById('suhua-content');
  const error   = document.getElementById('suhua-error');
  const footer  = document.getElementById('suhua-footer');

  loading.style.display = 'flex';
  content.style.display = 'none';
  error.style.display   = 'none';
  footer.style.display  = 'none';

  try {
    const res  = await fetch(`${SUHUA_BACKEND}/api/dashboard-data`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    renderSuhuaContent(data);
    suhuaDataLoaded = true;

    // 更新時間
    document.getElementById('suhua-update-time').textContent = `資料時間：${data.lastUpdate}`;
    footer.style.display = 'flex';

  } catch(e) {
    console.error('[蘇花] API 錯誤', e);
    loading.style.display = 'none';
    error.style.display   = 'block';
    footer.style.display  = 'flex';
    document.getElementById('suhua-update-time').textContent = '資料讀取失敗';
  }
}

function renderSuhuaContent(data) {
  const loading = document.getElementById('suhua-loading');
  const content = document.getElementById('suhua-content');

  loading.style.display = 'none';

  // 颱風橫幅
  const typhoonArea = document.getElementById('typhoon-banner-area');
  if (data.typhoonInfo) {
    const t = data.typhoonInfo;
    typhoonArea.innerHTML = `
      <div class="typhoon-banner">
        <div class="typhoon-banner-icon">🌀</div>
        <div>
          <div class="typhoon-banner-name">${t.name} · ${t.warning_type}</div>
          <div class="typhoon-banner-detail">
            中心位置 ${t.location}｜最大風速 ${t.wind_speed} m/s｜更新 ${t.update_time}
          </div>
        </div>
      </div>`;
  } else {
    typhoonArea.innerHTML = '';
  }

  // 三欄格線
  const grid = document.getElementById('suhua-grid');
  grid.innerHTML = `
    ${renderRoadCard(data.roadInfo || {})}
    ${renderRainCard(data.rainInfo || [])}
    ${renderEqCard(data.earthquakeInfo || [])}
  `;

  content.style.display = 'block';
}

// ── 路況卡 ──
function renderRoadCard(roadInfo) {
  const order = ['蘇澳－南澳', '南澳－和平', '和平－秀林'];
  const rows = [];

  order.forEach(sname => {
    const incidents = roadInfo[sname] || [];
    if (!incidents.length) {
      rows.push(`<div class="road-row">
        <div class="road-row-top">
          <span class="road-section-name">${sname}</span>
          <span class="road-badge green">✓ 正常</span>
        </div>
      </div>`);
    } else {
      incidents.forEach(item => {
        const badgeClass = item.class === 'road-red' ? 'red' : item.class === 'road-yellow' ? 'yellow' : 'green';
        const typeTag = item.is_old_road
          ? '<span class="road-type-tag old">舊蘇花</span>'
          : '<span class="road-type-tag">新蘇花</span>';
        const desc = item.desc ? `<div class="road-row-desc">${item.desc.substring(0, 60)}${item.desc.length > 60 ? '…' : ''}</div>` : '';
        rows.push(`<div class="road-row">
          <div class="road-row-top">
            <span class="road-section-name">${sname}</span>
            <span class="road-badge ${badgeClass}">${item.status}</span>
            ${typeTag}
          </div>
          ${desc}
        </div>`);
      });
    }
  });

  return `<div class="suhua-card">
    <div class="suhua-card-header">🚧 蘇花公路路況</div>
    <div class="suhua-card-body">${rows.join('')}</div>
  </div>`;
}

// ── 雨量卡 ──
function renderRainCard(rainInfo) {
  if (!rainInfo.length) {
    return `<div class="suhua-card">
      <div class="suhua-card-header">🌧 雨量資訊</div>
      <div class="suhua-card-body"><span style="font-size:12px;color:var(--text-muted);">資料讀取失敗</span></div>
    </div>`;
  }

  const rainClassMap = {
    'rain-green': 'green', 'rain-blue': 'blue', 'rain-yellow': 'yellow',
    'rain-orange': 'orange', 'rain-red': 'red', 'rain-none': '',
  };

  const rows = rainInfo.map(item => {
    // item.class from backend is the most reliable indicator:
    // 'rain-none'   = station reported, 0mm (no rain)
    // 'rain-nodata' = station did not respond
    // 'rain-error'  = station data error
    const isNoData  = item.class === 'rain-nodata' || item.class === 'rain-error' || item.mm === 'N/A';
    const isNoRain  = item.class === 'rain-none' || (!isNoData && (item.mm === 0 || parseFloat(item.mm) === 0));
    const mmText    = isNoData ? '—' : isNoRain ? '0 mm' : `${item.mm} mm`;
    const cls       = rainClassMap[item.class] || '';
    const noRainTag = isNoRain
      ? `<span style="font-size:10px;color:var(--road-green);background:var(--road-green-bg);padding:1px 6px;border-radius:3px;font-family:var(--mono);margin-left:5px;">無降雨</span>`
      : '';
    const noDataTag = isNoData
      ? `<span style="font-size:10px;color:var(--text-muted);background:var(--tag-bg);padding:1px 6px;border-radius:3px;font-family:var(--mono);margin-left:5px;">無資料</span>`
      : '';
    let forecastHtml = '';
    if (item.forecast && item.forecast !== 'N/A') {
      const isWarn = item.forecast.includes('%') && parseInt(item.forecast) > 50;
      forecastHtml = `<div class="rain-forecast${isWarn ? ' warn' : ''}">▸ ${item.forecast}</div>`;
    }
    return `<div class="rain-row">
      <span class="rain-location">${item.location}</span>
      <div class="rain-right">
        <div style="display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:2px;">
          <span class="rain-value ${cls}">${mmText}</span>${noRainTag}${noDataTag}
        </div>
        ${forecastHtml}
      </div>
    </div>`;
  }).join('');

  return `<div class="suhua-card">
    <div class="suhua-card-header">🌧 24hr 雨量</div>
    <div class="suhua-card-body">${rows}</div>
  </div>`;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatTime(isoStr) {

  return d.toLocaleString('zh-TW', {timeZone:'Asia/Taipei', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
}

function minsAgo(isoStr) {
  const diff = (Date.now() - new Date(isoStr)) / 60000;
  if (diff < 1) return '剛才';

}

async function fetchEarthquakes() {
  const el = document.getElementById('quake-content');
  try {
    const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/E-A0015-001?Authorization=${CWA_API_KEY}&limit=5`;
    const res  = await fetch(url);
    const data = await res.json();
    const quakes = data?.records?.Earthquake;
    if (!quakes || !quakes.length) { el.innerHTML = '<span class="quake-none">近期無顯著地震</span>'; return; }
    const now = Date.now();
    const h48 = 48 * 3600 * 1000;
    const recent = quakes.filter(q => {
      const t = new Date(q.EarthquakeInfo?.OriginTime || 0).getTime();
      return (now - t) < h48;
    });
    if (!recent.length) { el.innerHTML = '<span class="quake-none">✓ 近48小時無顯著地震</span>'; return; }
    el.innerHTML = recent.map(q => {
      const info = q.EarthquakeInfo || {};
      const mag  = parseFloat(info.EarthquakeMagnitude?.MagnitudeValue || 0);
      const loc  = info.Epicenter?.Location || '—';
      const time = formatTime(info.OriginTime || '');
      const isBig = mag >= 4;
      return `<div class="quake-item">
        <span class="quake-mag${isBig ? ' big' : ''}">${isBig ? '⚠ ' : ''}規模 ${mag.toFixed(1)}</span>
        <div class="quake-loc">${loc}</div>
        <div class="quake-time">${time}</div>

    }).join('');
  } catch(e) {

  }
}

async function fetchSheetLocation(sheetName) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    const res  = await fetch(url);
    const text = await res.text();
    const jsonStr = text.replace(/^[^(]+\(/, '').replace(/\);?$/, '');
    const data = JSON.parse(jsonStr);
    const rows = data?.table?.rows || [];
    for (let i = rows.length - 1; i >= 0; i--) {
      const row = rows[i].c;
      const latVal = row?.[1]?.v;
      const lngVal = row?.[2]?.v;
      if (latVal && lngVal && !isNaN(parseFloat(latVal)) && !isNaN(parseFloat(lngVal))) {
        let timeStr = row?.[0]?.v || '';
        let parsedTime = null;
        if (typeof timeStr === 'string' && timeStr.startsWith('Date(')) {
          const parts = timeStr.replace('Date(','').replace(')','').split(',').map(Number);
          parsedTime = new Date(Date.UTC(parts[0], parts[1], parts[2], parts[3]||0, parts[4]||0, parts[5]||0));
        } else if (timeStr) {
          const isPM = timeStr.includes('下午');
          const isAM = timeStr.includes('上午');
          const cleaned = timeStr.replace('上午','').replace('下午','').replace(/\//g,'-').replace(/\s+/g,' ').trim();
          const mt = cleaned.match(/(\d{4})-(\d{1,2})-(\d{1,2})\s*(\d{1,2}):(\d{2})(?::(\d{2}))?/);
          if (mt) {
            let [, y, mo, d, h, min, sec] = mt.map(Number);
            if (isPM && h < 12) h += 12;
            if (isAM && h === 12) h = 0;
            parsedTime = new Date(Date.UTC(y, mo - 1, d, h - 8, min, sec || 0));
          } else { parsedTime = new Date(cleaned); }
        }
        const isoTime = (parsedTime && !isNaN(parsedTime)) ? parsedTime.toISOString() : new Date(0).toISOString();
        return { time: isoTime, lat: parseFloat(latVal), lng: parseFloat(lngVal), acc: parseFloat(row?.[3]?.v || 0) };
      }
    }
  } catch(e) { console.error('Sheets error', e); }
  return null;
}

async function updateLocationDisplay() {
  ensureDeviceCards();

  const timeEl = document.getElementById('location-update-time');
  const pulse  = document.getElementById('location-pulse');

  const results = await Promise.all(DEVICES.map(d => fetchSheetLocation(d.id)));
  const now      = Date.now();
  const STALE_MS = 30 * 60 * 1000;
  const DWELL_MS = 10 * 60 * 1000;

  const validTimes = results.filter(Boolean)
    .map(r => new Date(r.time)).filter(d => !isNaN(d.getTime()))
    .sort((a, b) => b - a);
  if (validTimes[0]) timeEl.textContent = `最後更新：${formatTWTime(validTimes[0].toISOString())}`;

  const anyOutside = results.some(r => r && haversine(r.lat, r.lng, NTUCH_LAT, NTUCH_LNG) > NTUCH_RADIUS_M);
  pulse.className = anyOutside ? 'pulse-dot active' : 'pulse-dot idle';

  await Promise.all(DEVICES.map(async (device, i) => {
    const r        = results[i];
    const statusEl = document.getElementById(`device-status-${i}`);
    const timeEl2  = document.getElementById(`device-time-${i}`);
    const etaEl    = document.getElementById(`device-eta-${i}`);
    const staleEl  = document.getElementById(`device-stale-${i}`);
    const frameEl  = document.getElementById(`device-frame-${i}`);
    const dwell    = deviceDwellState[i];

    if (!r) {
      statusEl.className   = 'device-map-status stale';
      statusEl.textContent = '無資料';
      timeEl2.textContent  = '—';
      etaEl.innerHTML      = '';
      staleEl.innerHTML    = '';
      if (!frameEl.querySelector('img'))
        frameEl.innerHTML  = '<div class="device-map-overlay">無法取得定位資料</div>';
      return;
    }

    const distNTUCH = haversine(r.lat, r.lng, NTUCH_LAT, NTUCH_LNG);
    const isOutside = distNTUCH > NTUCH_RADIUS_M;
    const dataAge   = now - new Date(r.time).getTime();
    const isStale   = dataAge > STALE_MS;
    const distNTUCHText = distNTUCH > 1000
      ? `${(distNTUCH / 1000).toFixed(1)} km`
      : `${Math.round(distNTUCH)} m`;

    timeEl2.textContent = `最後更新：${formatTWTime(r.time)}`;

    // ── Phase 判斷（含 10 分鐘停留計時）──
    let phase = 'in';
    if (!isOutside) {
      dwell.arrivedAt      = null;
      dwell.confirmedDwell = false;
      phase = 'in';
    } else if (!currentDestLat || !currentDestLng) {
      phase = 'outbound';
    } else {
      const distToDest = haversine(r.lat, r.lng, currentDestLat, currentDestLng);
      if (distToDest < DEST_RADIUS_M) {
        phase = 'at_dest';
        if (!dwell.arrivedAt) dwell.arrivedAt = now;
        if (!dwell.confirmedDwell && (now - dwell.arrivedAt) >= DWELL_MS)
          dwell.confirmedDwell = true;
      } else {
        if (dwell.confirmedDwell) {
          phase = 'returning';
        } else {
          dwell.arrivedAt = null;
          phase = 'outbound';
        }
      }
    }

    // ── Status badge ──
    let statusClass, statusText;
    if (isStale)                    { statusClass = 'stale';     statusText = '逾時'; }
    else if (phase === 'in')        { statusClass = 'in';        statusText = '院內'; }
    else if (phase === 'outbound')  { statusClass = 'out';       statusText = '出勤中'; }
    else if (phase === 'at_dest')   { statusClass = 'out';       statusText = '已抵達'; }
    else if (phase === 'returning') { statusClass = 'returning'; statusText = '回程中　' + distNTUCHText; }
    statusEl.className   = `device-map-status ${statusClass}`;
    statusEl.textContent = statusText;

    // ── Stale warning ──
    staleEl.innerHTML = isStale
      ? `<div class="device-map-stale-warn">⚠ 此裝置已超過 30 分鐘無新的 GPS 數據</div>` : '';

    // ── ETA（顯眼大字版）──
    if (!isStale && (phase === 'outbound' || phase === 'returning') && window.google) {
      const destLat      = phase === 'outbound' ? currentDestLat : NTUCH_LAT;
      const destLng      = phase === 'outbound' ? currentDestLng : NTUCH_LNG;
      const etaDestLabel = phase === 'outbound' ? (currentDestName || '目的醫院') : '台大兒童醫院';
      const isReturn     = phase === 'returning';
      const eta          = await fetchDeviceETA(r.lat, r.lng, destLat, destLng);
      if (eta) {
        etaEl.innerHTML = `
          <div style="
            padding:14px 16px 12px;
            background:${isReturn ? 'var(--warn-light)' : 'var(--accent-light)'};
            border-bottom:1px solid var(--bg);
            text-align:center;
          ">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;
              color:${isReturn ? 'var(--warn)' : 'var(--accent)'};margin-bottom:6px;opacity:0.8;">
              ${isReturn ? '↩ 回程中' : '↗ 出勤中'}
            </div>
            <div style="font-family:var(--mono);font-size:32px;font-weight:300;
              color:${isReturn ? 'var(--warn)' : 'var(--accent)'};line-height:1;margin-bottom:5px;">
              約 ${eta.mins} <span style="font-size:14px;">分鐘</span>
            </div>
            <div style="font-size:11px;font-family:var(--mono);color:var(--text-muted);">
              預計 ${eta.arrivalStr} 抵達 ${etaDestLabel}
            </div>
          </div>`;
      } else {
        etaEl.innerHTML = '';
      }
    } else {
      etaEl.innerHTML = '';
    }

    // ── 地圖：Static Maps 圖片，只在座標真的變了才換 src ──
    const newMapURL = buildDeviceStaticMapURL(r, phase);
    const img = frameEl.querySelector('img');

    if (!img) {
      // 首次建立
      frameEl.innerHTML = `<img src="${newMapURL}"
        style="width:100%;height:100%;object-fit:cover;display:block;"
        alt="裝置位置地圖">`;
      deviceLastMapURL[i] = newMapURL;
    } else if (newMapURL !== deviceLastMapURL[i]) {
      // 位置或 phase 有變，直接換圖（不會白屏）
      img.src = newMapURL;
      deviceLastMapURL[i] = newMapURL;
    }
    // URL 沒變 → img 完全不動
  }));
}

function startLiveUpdates() {
  updateLocationDisplay();
  fetchEarthquakes();
  if (locationInterval) clearInterval(locationInterval);
  locationInterval = setInterval(updateLocationDisplay, 2 * 60 * 1000);
}

// showResult 的地圖擴充（覆蓋原版）
const _origShowResult = showResult;
window.showResult = async function(name) {
  _origShowResult(name);
  const hosp = DB[name];
  currentDestName   = name;
  currentDestCounty = hosp.county || '台北市';
  DEVICES.forEach((_, i) => {
    deviceDwellState[i].arrivedAt      = null;
    deviceDwellState[i].confirmedDwell = false;
  });
  const mapContainer = document.getElementById('map-container');
  mapContainer.style.height = '380px';
  mapContainer.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:20px;text-align:center;line-height:380px;">地圖載入中…</div>';
  const badge = document.getElementById('travel-time-badge');
  badge.style.display = 'none';
  try {
    const coords = await geocodeHospital(name, currentDestCounty);
    if (coords) {
      currentDestLat = coords.lat;
      currentDestLng = coords.lng;
      loadMapsAPI();
      if (window.google) renderMap();
    } else {
      mapContainer.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:20px;text-align:center;line-height:380px;">地圖服務異常</div>';
    }
  } catch(e) {
    mapContainer.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:20px;text-align:center;line-height:380px;">地圖服務異常</div>';
  }
  fetchWeather(currentDestCounty);
};

document.addEventListener('DOMContentLoaded', () => {
  loadMapsAPI();
  startLiveUpdates();
});
</script>
