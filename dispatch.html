<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台大兒童醫院 · 出勤派遣</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd6;
    --text: #2c2825;
    --text-muted: #9a9189;
    --text-light: #c4bfb8;
    --accent: #4a6741;
    --accent-light: #edf2ec;
    --warn: #b85c1a;
    --warn-light: #fef3ec;
    --info: #1a5a8a;
    --info-light: #edf4fb;
    --tag-bg: #ede9e3;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--text);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { color: white; }
  .header-title { font-size: 14px; font-weight: 500; letter-spacing: 0.02em; }
  .header-subtitle { font-size: 11px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.04em; }
  .back-link {
    font-size: 12px; color: var(--text-muted);
    text-decoration: none; font-family: var(--mono);
    padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 6px; transition: border-color 0.2s;
  }
  .back-link:hover { border-color: var(--text-muted); color: var(--text); }

  /* ── Main ── */
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: 0.01em;
  }
  .page-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  /* ── Form card ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .form-section {
    padding: 22px 24px;
    border-bottom: 1px solid var(--border);
  }
  .form-section:last-of-type { border-bottom: none; }

  .form-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-weight: 400;
    margin-bottom: 12px;
    display: block;
  }

  /* ── Task type toggle ── */
  .task-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .task-option { position: relative; }
  .task-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }
  .task-option label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    background: var(--bg);
    user-select: none;
  }
  .task-option label .task-icon { font-size: 18px; }
  .task-option label .task-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .task-option label .task-desc { font-size: 10px; color: var(--text-light); letter-spacing: 0.04em; display: block; margin-top: 1px; }

  .task-option input:checked + label {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }
  .task-option input:checked + label .task-name { color: var(--accent); }
  .task-option input:checked + label .task-desc { color: var(--accent); opacity: 0.7; }

  /* ── Scheduled time picker ── */
  .scheduled-picker {
    display: none;
    margin-top: 14px;
  }
  .scheduled-picker.show { display: block; }
  .datetime-input {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 11px 14px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .datetime-input:focus { border-color: var(--accent); }

  /* ── ETA display ── */
  .eta-badge {
    display: none;
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--info-light);
    border: 1px solid #b8d4ed;
    border-radius: 7px;
    font-size: 12px;
    color: var(--info);
    align-items: center;
    gap: 6px;
  }
  .eta-badge.show { display: flex; }
  .eta-spinner {
    width: 10px; height: 10px;
    border: 1.5px solid #b8d4ed;
    border-top-color: var(--info);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  /* ── Hospital search ── */
  .search-wrap { position: relative; }
  .search-input {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 11px 14px 11px 40px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-light); }
  .search-icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  .selected-hospital {
    display: none;
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--accent-light);
    border: 1px solid var(--accent);
    border-radius: 7px;
    font-size: 13px;
    color: var(--accent);
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .selected-hospital.show { display: flex; }
  .selected-hospital-name { flex: 1; font-weight: 500; }
  .selected-clear {
    background: none; border: none;
    color: var(--accent); cursor: pointer;
    font-size: 16px; line-height: 1;
    padding: 0; opacity: 0.6;
    transition: opacity 0.15s;
  }
  .selected-clear:hover { opacity: 1; }

  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    z-index: 200;
    max-height: 260px;
    overflow-y: auto;
    display: none;
  }
  .suggestions.open { display: block; }
  .suggestion-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid var(--bg);
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--surface2); }
  .suggestion-item mark { background: #fde68a; border-radius: 2px; padding: 0 1px; }
  .suggestion-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 3px;
    background: var(--tag-bg);
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .suggestion-badge.known {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* ── Patient notes ── */
  .patient-textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 11px 14px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    resize: vertical;
    min-height: 96px;
    transition: border-color 0.2s;
    line-height: 1.65;
  }
  .patient-textarea:focus { border-color: var(--accent); }
  .patient-textarea::placeholder { color: var(--text-light); }
  .char-hint {
    font-size: 10px;
    color: var(--text-light);
    margin-top: 5px;
    font-family: var(--mono);
  }

  /* ── Submit button ── */
  .form-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .btn-dispatch {
    width: 100%;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, background 0.3s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-dispatch:hover:not(:disabled) { opacity: 0.82; }
  .btn-dispatch:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Result panel ── */
  #result-panel {
    display: none;
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  #result-panel.show { display: block; }

  .result-header {
    padding: 16px 20px;
    background: var(--accent-light);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-header-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .result-body { padding: 16px 20px; }

  .message-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    font-family: var(--sans);
    margin-bottom: 12px;
  }

  .result-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-copy {
    padding: 10px 16px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-weight: 400;
  }
  .btn-copy-link {
    background: var(--text);
    color: white;
    border: none;
  }
  .btn-copy-link:hover { opacity: 0.82; }
  .btn-copy-msg {
    background: none;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-copy-msg:hover { border-color: var(--text-muted); color: var(--text); }

  .copy-toast {
    display: none;
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--accent-light);
    border-radius: 6px;
    font-size: 12px;
    color: var(--accent);
    text-align: center;
    font-family: var(--mono);
  }
  .copy-toast.show { display: block; }

  .loading-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mini-spinner {
    width: 10px; height: 10px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .suggestions::-webkit-scrollbar { width: 5px; }
  .suggestions::-webkit-scrollbar-track { background: transparent; }
  .suggestions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 480px) {
    main { padding: 24px 16px 48px; }
    header { padding: 0 16px; }
    .result-actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div>
      <div class="header-title">台大兒童醫院 轉運外接系統</div>
      <div class="header-subtitle">NTUCH Transport Team · Dispatch</div>
    </div>
  </div>
  <a class="back-link" href="index.html">← 查詢系統</a>
</header>

<main>
  <div class="page-title">出勤派遣</div>
  <div class="page-subtitle">填寫後自動發送 LINE 群組通知</div>

  <div class="form-card">

    <!-- 任務類型 -->
    <div class="form-section">
      <label class="form-label">任務類型</label>
      <div class="task-toggle">
        <div class="task-option">
          <input type="radio" name="task-type" id="task-outbound" value="外接" checked>
          <label for="task-outbound">
            <span class="task-icon">🚑</span>
            <div>
              <div class="task-name">外接任務</div>
              <div class="task-desc">前往外院接回病患</div>
            </div>
          </label>
        </div>
        <div class="task-option">
          <input type="radio" name="task-type" id="task-transfer" value="轉出">
          <label for="task-transfer">
            <span class="task-icon">🏥</span>
            <div>
              <div class="task-name">轉出任務</div>
              <div class="task-desc">將病患轉送至他院</div>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- 出勤時間 -->
    <div class="form-section">
      <label class="form-label">出勤時間</label>
      <div class="task-toggle">
        <div class="task-option">
          <input type="radio" name="time-mode" id="time-now" value="now" checked>
          <label for="time-now">
            <span class="task-icon">⚡</span>
            <div>
              <div class="task-name">即刻出勤</div>
              <div class="task-desc">使用當下時間</div>
            </div>
          </label>
        </div>
        <div class="task-option">
          <input type="radio" name="time-mode" id="time-scheduled" value="scheduled">
          <label for="time-scheduled">
            <span class="task-icon">🗓️</span>
            <div>
              <div class="task-name">預計出勤</div>
              <div class="task-desc">指定日期與時間</div>
            </div>
          </label>
        </div>
      </div>
      <div class="scheduled-picker" id="scheduled-picker">
        <input type="datetime-local" id="scheduled-datetime" class="datetime-input" />
        <div style="font-size:10px;color:var(--text-muted);margin-top:5px;font-family:var(--mono);">請選擇預計出勤的日期與時間</div>
      </div>
    </div>

    <!-- 出勤地點 -->
    <div class="form-section">
      <label class="form-label">出勤地點</label>
      <div class="search-wrap" id="hospital-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="hospital-input"
          placeholder="輸入關鍵字，例：慈濟、長庚、成大…" autocomplete="off"/>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <div class="selected-hospital" id="selected-display">
        <span class="selected-hospital-name" id="selected-name"></span>
        <button class="selected-clear" onclick="clearHospital()" title="清除">✕</button>
      </div>
      <!-- ETA 顯示 -->
      <div class="eta-badge" id="eta-badge">
        <div class="eta-spinner" id="eta-spinner"></div>
        <span id="eta-text">計算車程中…</span>
      </div>
      <div class="loading-hint" id="loading-hint">
        <div class="mini-spinner"></div>
        <span>院所名單載入中…</span>
      </div>
    </div>

    <!-- 病人概況 -->
    <div class="form-section">
      <label class="form-label" for="patient-notes">病人概況</label>
      <textarea class="patient-textarea" id="patient-notes"
        placeholder="例：34 週早產兒，需呼吸器支持，血氧不穩定…"
        maxlength="300"
        oninput="updateCharCount()"></textarea>
      <div class="char-hint" id="char-hint">0 / 300</div>
    </div>

    <!-- 送出按鈕 -->
    <div class="form-footer">
      <button class="btn-dispatch" id="dispatch-btn" onclick="generateDispatch()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        發送出勤通知
      </button>
    </div>

  </div>

  <!-- 結果面板 -->
  <div id="result-panel">
    <div class="result-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span class="result-header-title">出勤通知已發送至 LINE 群組</span>
    </div>
    <div class="result-body">
      <div class="message-preview" id="message-preview"></div>
      <div class="result-actions">
        <button class="btn-copy btn-copy-link" onclick="copyLink()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          複製 Dashboard 連結
        </button>
        <button class="btn-copy btn-copy-msg" onclick="copyMessage()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          複製完整訊息
        </button>
      </div>
      <div class="copy-toast" id="copy-toast"></div>
    </div>
  </div>

</main>

<script>
// ── 設定 ──
const DASHBOARD_BASE = 'https://t1190t.github.io/ntuch-transport/';
const HOSPITALS_CSV  = 'hospitals.csv';
const BACKEND        = 'https://su-hua-dashboard.onrender.com';
const WEBEX_LINK     = 'https://tinyurl.com/3h8y6va5';
const MAPS_API_KEY   = 'AIzaSyCLjGdhAYU2rmxDCpnhyq4r0L_sr_pvJoI';
const NTUCH_LAT      = 25.0426;
const NTUCH_LNG      = 121.5184;

const KNOWN_HOSPITALS = new Set();
let ALL_HOSPITALS    = [];
let selectedHospital = null;
let currentEtaText   = '';   // 儲存計算好的 ETA 文字
let mapsApiLoaded    = false;

// ── 載入 Google Maps API ──
function loadMapsAPI() {
  if (mapsApiLoaded) return;
  mapsApiLoaded = true;
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_API_KEY}&callback=onMapsReady&language=zh-TW`;
  s.async = true;
  document.head.appendChild(s);
}

window.onMapsReady = function() {
  if (selectedHospital) calculateETA(selectedHospital);
};

// ── 計算 ETA（台大兒童醫院 → 目的地）──
function calculateETA(hospitalName) {
  const badge   = document.getElementById('eta-badge');
  const spinner = document.getElementById('eta-spinner');
  const etaEl   = document.getElementById('eta-text');

  badge.classList.add('show');
  spinner.style.display = 'block';
  etaEl.textContent = '計算車程中…';
  currentEtaText = '';

  if (!window.google || !window.google.maps) {
    loadMapsAPI();
    return;
  }

  const geocoder = new google.maps.Geocoder();
  geocoder.geocode({ address: hospitalName + ' 台灣', region: 'TW' }, (results, status) => {
    if (status !== 'OK' || !results[0]) {
      badge.classList.remove('show');
      currentEtaText = '';
      return;
    }

    const destLat = results[0].geometry.location.lat();
    const destLng = results[0].geometry.location.lng();

    const service = new google.maps.DistanceMatrixService();
    service.getDistanceMatrix({
      origins: [{ lat: NTUCH_LAT, lng: NTUCH_LNG }],
      destinations: [{ lat: destLat, lng: destLng }],
      travelMode: 'DRIVING',
      language: 'zh-TW'
    }, (response, status) => {
      spinner.style.display = 'none';
      if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
        const mins = Math.round(response.rows[0].elements[0].duration.value / 60);
        currentEtaText = `約 ${mins} 分鐘`;
        etaEl.textContent = `🚗 台大兒童 → 目的地：${currentEtaText}`;
      } else {
        badge.classList.remove('show');
        currentEtaText = '';
      }
    });
  });
}

// ── 載入 CSV ──
async function loadHospitals() {
  try {
    const res   = await fetch(HOSPITALS_CSV);
    const text  = await res.text();
    const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/);
    const seen  = new Set();
    lines.forEach(line => {
      const name = line.trim();
      if (!name || name === '醫事機構名稱' || seen.has(name)) return;
      seen.add(name);
      ALL_HOSPITALS.push(name);
    });
    document.getElementById('loading-hint').style.display = 'none';
    document.getElementById('hospital-input').disabled = false;
    document.getElementById('hospital-input').placeholder = '輸入關鍵字，例：慈濟、長庚、成大…';
    console.log(`[dispatch] 載入 ${ALL_HOSPITALS.length} 家院所`);
  } catch(e) {
    console.error('[dispatch] CSV 載入失敗', e);
    document.getElementById('loading-hint').innerHTML = '⚠ 院所名單載入失敗，請重新整理';
  }
}

// ── 搜尋邏輯 ──
const hospitalInput = document.getElementById('hospital-input');
const suggestionsEl = document.getElementById('suggestions');

hospitalInput.disabled = true;

hospitalInput.addEventListener('input', () => {
  const q = hospitalInput.value.trim();
  if (!q) { hideSuggestions(); return; }
  const matches = ALL_HOSPITALS.filter(n => n.includes(q)).slice(0, 15);
  if (!matches.length) { hideSuggestions(); return; }
  suggestionsEl.innerHTML = matches.map(name => {
    const isKnown = KNOWN_HOSPITALS.has(name);
    const hl = name.replace(q, `<mark>${q}</mark>`);
    return `<div class="suggestion-item" onclick="selectHospital('${name.replace(/'/g,"\\'")}')">
      <span>${hl}</span>
      ${isKnown
        ? '<span class="suggestion-badge known">有紀錄</span>'
        : '<span class="suggestion-badge">查詢地圖</span>'}
    </div>`;
  }).join('');
  suggestionsEl.classList.add('open');
});

hospitalInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideSuggestions();
});

document.addEventListener('click', e => {
  if (!e.target.closest('#hospital-wrap')) hideSuggestions();
});

function hideSuggestions() { suggestionsEl.classList.remove('open'); }

function selectHospital(name) {
  selectedHospital = name;
  hospitalInput.value = '';
  hospitalInput.placeholder = '已選擇（點右側 ✕ 可更換）';
  hideSuggestions();
  document.getElementById('selected-name').textContent = name;
  document.getElementById('selected-display').classList.add('show');
  checkFormReady();
  calculateETA(name);   // 選定院所後立即計算 ETA
}

function clearHospital() {
  selectedHospital = null;
  currentEtaText = '';
  hospitalInput.value = '';
  hospitalInput.placeholder = '輸入關鍵字，例：慈濟、長庚、成大…';
  document.getElementById('selected-display').classList.remove('show');
  document.getElementById('eta-badge').classList.remove('show');
  document.getElementById('result-panel').classList.remove('show');
  checkFormReady();
}

// ── 出勤時間模式切換 ──
document.querySelectorAll('input[name="time-mode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const picker = document.getElementById('scheduled-picker');
    if (radio.value === 'scheduled') {
      picker.classList.add('show');
      // 預設為現在時間 + 1 小時
      const dtInput = document.getElementById('scheduled-datetime');
      if (!dtInput.value) {
        const now = new Date();
        now.setHours(now.getHours() + 1);
        now.setSeconds(0, 0);
        // datetime-local 格式：YYYY-MM-DDTHH:MM
        const localIso = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
          .toISOString().slice(0, 16);
        dtInput.value = localIso;
      }
    } else {
      picker.classList.remove('show');
    }
  });
});

function updateCharCount() {
  const len = document.getElementById('patient-notes').value.length;
  document.getElementById('char-hint').textContent = `${len} / 300`;
}

function checkFormReady() {
  document.getElementById('dispatch-btn').disabled = !selectedHospital;
}

// ── 產生時間字串 ──
function buildTimeString() {
  const timeMode = document.querySelector('input[name="time-mode"]:checked').value;

  if (timeMode === 'scheduled') {
    const dtInput = document.getElementById('scheduled-datetime');
    if (!dtInput.value) {
      alert('請選擇預計出勤時間');
      return null;
    }
    const dt = new Date(dtInput.value);
    const formatted = dt.toLocaleString('zh-TW', {
      timeZone: 'Asia/Taipei',
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
      hourCycle: 'h23'
    });
    return '預計 ' + formatted;
  } else {
    const now = new Date();
    return now.toLocaleString('zh-TW', {
      timeZone: 'Asia/Taipei',
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
      hourCycle: 'h23'
    });
  }
}

// ── 產生並發送出勤通知 ──
async function generateDispatch() {
  if (!selectedHospital) return;

  const taskType = document.querySelector('input[name="task-type"]:checked').value;
  const notes    = document.getElementById('patient-notes').value.trim();
  const timeStr  = buildTimeString();
  if (!timeStr) return;   // 預計出勤但未填時間，已 alert

  const dashboardURL = `${DASHBOARD_BASE}?hospital=${encodeURIComponent(selectedHospital)}`;

  // ── 組合訊息（前端預覽 + 後端參考）──
  const msgLines = [
    `🚑 台大兒童醫院 出勤通知`,
    ``,
    `任務類型：${taskType === '外接' ? '🔵 外接任務' : '🟠 轉出任務'}`,
  ];

  if (currentEtaText) {
    msgLines.push(`預計車程：${currentEtaText}（台大兒童 → 目的地）`);
  }

  msgLines.push(
    `出勤地點：${selectedHospital}`,
    `出勤時間：${timeStr}`,
  );

  if (notes) {
    msgLines.push(``, `病人概況：`, notes);
  }

  msgLines.push(
    ``,
    `📊 即時資訊 Dashboard：`,
    dashboardURL,
    ``,
    `📹 轉診眼鏡連結：`,
    WEBEX_LINK
  );

  const fullMessage = msgLines.join('\n');
  document.getElementById('message-preview').textContent = fullMessage;
  document.getElementById('result-panel').classList.add('show');

  // 按鈕改為發送中
  const btn = document.getElementById('dispatch-btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="mini-spinner" style="width:14px;height:14px;border-width:2px;border-top-color:white;flex-shrink:0;"></div> 發送中…`;

  try {
    const resp = await fetch(`${BACKEND}/api/line-notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        hospital:      selectedHospital,
        task_type:     taskType,
        notes:         notes,
        time_str:      timeStr,
        dashboard_url: dashboardURL,
        eta_text:      currentEtaText,
        webex_link:    WEBEX_LINK,
      }),
    });
    const result = await resp.json();

    if (result.status === 'sent') {
      btn.innerHTML = `✓ 已發送至 LINE 群組`;
      btn.style.background = 'var(--accent)';
      document.querySelector('.result-header-title').textContent = '出勤通知已發送至 LINE 群組 ✓';
    } else {
      throw new Error(result.error || '未知錯誤');
    }
  } catch(e) {
    console.error('[LINE notify]', e);
    btn.innerHTML = `⚠ LINE 發送失敗，請手動複製訊息`;
    btn.style.background = 'var(--warn)';
    btn.disabled = false;
    document.querySelector('.result-header-title').textContent = '請手動複製訊息貼到 LINE 群組';
  }

  // 4 秒後恢復按鈕
  setTimeout(() => {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 發送出勤通知`;
    btn.style.background = 'var(--text)';
    btn.disabled = false;
  }, 4000);

  // 捲動到結果面板
  setTimeout(() => {
    document.getElementById('result-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

// ── 複製功能 ──
function showToast(msg) {
  const toast = document.getElementById('copy-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function copyLink() {
  if (!selectedHospital) return;
  const url = `${DASHBOARD_BASE}?hospital=${encodeURIComponent(selectedHospital)}`;
  navigator.clipboard.writeText(url)
    .then(() => showToast('✓ Dashboard 連結已複製'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('✓ Dashboard 連結已複製');
    });
}

function copyMessage() {
  const msg = document.getElementById('message-preview').textContent;
  if (!msg) return;
  navigator.clipboard.writeText(msg)
    .then(() => showToast('✓ 完整訊息已複製，可貼到 LINE 群組'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = msg; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('✓ 完整訊息已複製，可貼到 LINE 群組');
    });
}

// ── 初始化 ──
loadHospitals();
loadMapsAPI();   // 預先載入 Maps API，讓 ETA 算得更快
</script>
